version: '3'

services:
  nav-item:
    build: .
    container_name: nav-item
    ports:
      - "3000:3000"
    environment:
      - SITE_TITLE=我的导航
      - PORT=3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=123456
      # ========== 统一存储路径 ==========
      # 所有持久化数据（数据库 + 上传文件）统一到 /app/database
      - DB_PATH=/app/database/nav.db
      - UPLOAD_DIR=/app/database/uploads
      # ========== Cloudflare R2 (可选，多容器同步时启用) ==========
      # - R2_ACCOUNT_ID=
      # - R2_ACCESS_KEY_ID=
      # - R2_SECRET_ACCESS_KEY=
      # - R2_BUCKET_NAME=
      # - R2_PUBLIC_DOMAIN=
    volumes:
      # 【核心改动】仅使用一个持久化卷
      # 数据库文件: /app/database/nav.db
      # 上传文件:   /app/database/uploads/
      # 壁纸缓存:   /app/database/uploads/bg_*.ext
      # 图标缓存:   /app/database/uploads/icon_*.ext
      - ./database:/app/database
    restart: unless-stopped
