version: '3'

services:
  nav-item:
    build: .
    container_name: nav-item
    ports:
      - "3000:3000"
    environment:
      - SITE_TITLE=我的导航
      - PORT=3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=123456
      - DB_PATH=/app/database/nav.db
      - UPLOAD_DIR=/app/database/uploads
      # ===== Cloudflare R2 =====
      # 不在此处填写密钥，请在容器平台的「环境变量」中注入：
      #   R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
      #   R2_BUCKET_NAME / R2_PUBLIC_DOMAIN
      # 全部不填时系统自动降级为仅本地存储。
    volumes:
      - ./database:/app/database
    restart: unless-stopped
