version: '3'

services:
  nav-item:
    build: .
    container_name: nav-item
    ports:
      - "3000:3000"
    environment:
      - SITE_TITLE=我的导航
      - PORT=3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=123456
      - DB_PATH=/app/database/nav.db
      - UPLOAD_DIR=/app/database/uploads
      # ===== Cloudflare R2 =====
      # 不在此处填写 R2 密钥，避免泄露风险。
      # 请在容器平台（如 Portainer / Railway / Fly.io / 1Panel 等）
      # 部署镜像时，通过平台的「环境变量」功能注入以下 5 个变量：
      #   R2_ACCOUNT_ID
      #   R2_ACCESS_KEY_ID
      #   R2_SECRET_ACCESS_KEY
      #   R2_BUCKET_NAME
      #   R2_PUBLIC_DOMAIN
      # 全部留空或不填时，系统自动降级为仅本地存储，不会报错。
    volumes:
      - ./database:/app/database
    restart: unless-stopped
