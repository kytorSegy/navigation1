# 这个名字会显示在你的 GitHub 网页的 Actions 选项卡里
name: Build and Publish Docker Image

# 定义什么时候触发这个自动化任务
on:
  push:
    # 当有新的代码被推送到 main 分支时，自动开始打包。
    # 【注意】如果你的主分支名字叫 master，请把这里的 main 改成 master。
    branches: ['main'] 

# 定义一些全局变量，方便下面反复使用
env:
  REGISTRY: ghcr.io # 目标仓库地址：GitHub 官方的容器镜像仓库
  # github.repository 会自动变成你的 "用户名/仓库名" (例如: kytorsegy/navigation1)
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest # 给这个任务分配一台最新的 Ubuntu 虚拟电脑来运行

    # 【核心修复点】这里的权限声明配合你刚才截图里的全局设置，就能彻底解决 permission_denied 报错
    permissions:
      contents: read    # 允许系统读取你仓库里的代码文件
      packages: write   # 允许系统向 ghcr.io 写入(上传)制作好的镜像包裹

    steps:
      # 步骤 1：检出代码
      # 也就是把你的代码从 GitHub 下载到这台分配的 Ubuntu 虚拟电脑上
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤 2：登录镜像仓库
      # 拿着 GitHub 自动派发的系统钥匙 (GITHUB_TOKEN) 登录 ghcr.io
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }} # 自动获取触发此任务的用户名
          password: ${{ secrets.GITHUB_TOKEN }} # 使用系统自带的安全令牌，不需要你手动去设密码

      # 步骤 3：提取元数据
      # 为你的镜像自动生成版本号（比如 latest，或者具体的日期/代码版本号）
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # 步骤 4：构建并推送镜像 (这里就是执行 docker buildx 的地方)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # 告诉 Docker 在当前项目的根目录下寻找 Dockerfile
          push: true # 构建成功后，立刻执行上传动作
          tags: ${{ steps.meta.outputs.tags }} # 贴上步骤3生成的版本标签
          labels: ${{ steps.meta.outputs.labels }}
