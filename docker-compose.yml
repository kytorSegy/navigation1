# =====================================================
# 文件: docker-compose.yml
# 说明: 整体替换此文件
# 改动: 移除独立的 uploads 卷挂载，所有持久化数据统一在 ./database 下
# =====================================================

version: '3'

services:
  nav-item:
    build: .
    container_name: nav-item
    ports:
      - "3000:3000"
    environment:
      - SITE_TITLE=我的导航
      - PORT=3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=123456
    volumes:
      # 只需挂载一个目录，数据库和上传文件全部在里面
      - ./database:/app/database
    restart: unless-stopped
